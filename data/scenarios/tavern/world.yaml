locations:
  tavern_hall:
    name: 酒馆大厅
    description: >-
      推开沉重的橡木门，你走进了「醉龙酒馆」。大厅里弥漫着麦酒和烤肉的香气，
      壁炉中的火焰投射出温暖的光芒。几张粗糙的木桌散落各处，角落里坐着一位
      风尘仆仆的旅行者。墙上挂着一张泛黄的告示。
    exits:
      north:
        target: bar_area
        description: 通往吧台区的木质拱门
      east:
        target: corridor
        description: 通往客房走廊的昏暗过道
      west:
        target: backyard
        description: 通往后院的侧门
    items:
      - old_notice
    npcs:
      - traveler

  bar_area:
    name: 吧台区
    description: >-
      长长的橡木吧台后面，酒保格里姆正在擦拭杯子。吧台上摆着各式酒瓶，
      墙上挂着一面铜质奖牌和一幅褪色的城镇地图。吧台尽头有一扇沉重的
      铁门，上面挂着一把锁。
    exits:
      south:
        target: tavern_hall
        description: 回到大厅
      down:
        target: cellar
        locked: true
        key_item: cellar_key
        description: 通往地下室的铁门（已锁）
    items: []
    npcs:
      - bartender_grim

  cellar:
    name: 地下室
    description: >-
      阴暗潮湿的地下室，空气中弥漫着霉味。几个破旧的木桶堆在角落，
      蜘蛛网挂满了石质墙壁。地面上有一些奇怪的划痕，似乎有什么沉重的
      东西被拖过。
    exits:
      up:
        target: bar_area
        description: 返回吧台区的石阶
    items:
      - old_barrel
    npcs: []

  corridor:
    name: 客房走廊
    description: >-
      狭窄的走廊两侧排列着几扇紧闭的房门。走廊尽头的房间门半掩着，
      透出昏暗的烛光。一位戴着兜帽的神秘旅客靠在墙边，似乎在等待什么。
    exits:
      west:
        target: tavern_hall
        description: 回到大厅
    items: []
    npcs:
      - mysterious_guest

  backyard:
    name: 后院
    description: >-
      杂草丛生的后院，月光洒在一辆废弃的马车上。马车的篷布已经破烂不堪，
      但车厢下似乎藏着什么东西。院子角落有一口枯井，井沿上长满了青苔。
    exits:
      east:
        target: tavern_hall
        description: 回到酒馆大厅
    items:
      - abandoned_cart
      - dry_well
    npcs: []

items:
  old_notice:
    name: 旧告示
    description: >-
      一张泛黄的告示，上面写着：「警告：近日地下室频繁传出异响，
      闲人勿入。——酒馆老板 格里姆」
    portable: true

  cellar_key:
    name: 地下室钥匙
    description: 一把生锈的铁钥匙，上面刻着一个小小的龙形标记
    portable: true
    usable_with:
      - cellar_door

  old_barrel:
    name: 旧木桶
    description: 几个破旧的木桶，其中一个底部有奇怪的刮痕
    portable: false

  abandoned_cart:
    name: 废弃马车
    description: 一辆破旧的马车，篷布下隐约能看到一个小铁盒
    portable: false

  dry_well:
    name: 枯井
    description: 一口枯井，井沿长满青苔，井底黑漆漆的看不到尽头
    portable: false

  rusty_box:
    name: 生锈铁盒
    description: 从马车下找到的铁盒，里面有一把备用钥匙
    portable: true

  spare_key:
    name: 备用钥匙
    description: 一把形状和地下室钥匙相似的备用钥匙
    portable: true
    usable_with:
      - cellar_door
