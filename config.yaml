llm:
  intent:
    provider: openai
    model: gpt-4o-mini
    temperature: 0.1
    max_tokens: 200
    max_retries: 3
    timeout: 10.0
  narrative:
    provider: openai
    model: gpt-4o
    temperature: 0.8
    max_tokens: 500
    max_retries: 2
    timeout: 30.0
    stream: true

game:
  auto_save_interval: 5
  undo_history_size: 50
  saves_dir: "saves"
  scenario: data/scenarios/tavern

debug:
  show_intent_json: false
  show_prompt: false
  log_level: INFO
