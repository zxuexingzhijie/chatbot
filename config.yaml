llm:
  intent:
    provider: openai
    model: gpt-4o-mini
    temperature: 0.1
    max_retries: 3
    timeout: 10.0
  narrative:
    provider: openai
    model: gpt-4o
    temperature: 0.8
    max_retries: 2
    timeout: 30.0
    stream: true

# ── Ollama (local) ──────────────────────────────────────────────────────────
# Ollama is OpenAI-compatible. Use provider: openai with a custom base_url.
# Start Ollama locally: https://ollama.com
# Example:
#
# llm:
#   intent:
#     provider: openai
#     model: llama3.2
#     base_url: http://localhost:11434/v1
#     api_key: ollama        # Ollama requires a non-empty string; value is ignored
#     temperature: 0.1
#   narrative:
#     provider: openai
#     model: llama3.2
#     base_url: http://localhost:11434/v1
#     api_key: ollama
#     temperature: 0.8
# ───────────────────────────────────────────────────────────────────────────

game:
  vi_mode: false
  auto_save_interval: 5
  undo_history_size: 50
  saves_dir: "saves"
  scenario: tavern
  typewriter_effect: true

debug:
  show_intent_json: true
  show_prompt: true
  log_level: DEBUG
