nodes:
  - id: cellar_mystery_discovered
    act: act1
    requires: []
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: location
          event_id: cellar

    fail_forward:
      after_turns: 8
      hint_event:
        description: "格里姆擦拭杯子时无意间说道：地下室里的东西，不是一般人能碰的……"
        actor: bartender_grim

    effects:
      quest_updates:
        cellar_mystery: { status: discovered }
      new_events:
        - id: cellar_entered
          type: story
          description: "玩家首次进入地下室，发现异常划痕"

    narrator_hint: "氛围阴森，引导玩家注意地面划痕和旧木桶，暗示有秘密。"

  - id: cellar_secret_revealed
    act: act1
    requires: [cellar_mystery_discovered]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: relationship
          source: player
          target: bartender_grim
          attribute: trust
          operator: ">="
          value: 30
        - type: event
          event_id: cellar_entered
          check: exists

    fail_forward:
      after_turns: 15
      hint_event:
        description: "深夜，你隐约听到地下室传来拖拽重物的声音。"
        actor: bartender_grim

    effects:
      quest_updates:
        cellar_mystery: { status: revealed }
      new_events:
        - id: secret_learned
          type: story
          description: "玩家得知地下室密道的存在"

    narrator_hint: "格里姆终于开口，压低声音提及密道，措辞谨慎。"

  # ── Side Quest A: Traveler's Lost Amulet ──────────────────────────────────

  - id: traveler_quest_start
    act: act1
    requires: []
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: event
          event_id: talked_to_traveler
          check: exists

    fail_forward:
      after_turns: 8
      hint_event:
        description: "旅行者艾琳叹了口气，喃喃道：'要是能找到我的护身符就好了……'"
        actor: traveler

    effects:
      quest_updates:
        traveler_quest: { status: active }
      new_events:
        - id: traveler_quest_accepted
          type: side_quest
          description: "艾琳请求你帮她找回丢失的银质护身符"
      add_items:
        - item_id: lost_amulet
          to: backyard

    narrator_hint: "艾琳恳请帮忙，语气诚恳焦急。她提到护身符可能掉在了后院马车附近。"

  - id: amulet_found
    act: act1
    requires: [traveler_quest_start]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: inventory
          event_id: lost_amulet

    fail_forward:
      after_turns: 15
      hint_event:
        description: "后院马车附近似乎有什么东西在微微发光。"
        actor: traveler

    effects:
      quest_updates:
        traveler_quest: { status: amulet_found }
      new_events:
        - id: amulet_picked_up
          type: side_quest
          description: "玩家找到了艾琳的银质护身符"

    narrator_hint: "护身符泛着微光，表面的符文似乎在呼应什么。这对艾琳一定很重要。"

  - id: traveler_quest_complete
    act: act1
    requires: [amulet_found]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: event
          event_id: amulet_picked_up
          check: exists
        - type: location
          event_id: tavern_hall

    effects:
      quest_updates:
        traveler_quest: { status: completed }
      new_events:
        - id: traveler_quest_done
          type: side_quest
          description: "艾琳感激地接过护身符，送出地图碎片作为答谢"
      remove_items:
        - item_id: lost_amulet
          from: inventory
      add_items:
        - item_id: map_fragment
          to: inventory
      character_stat_deltas:
        traveler:
          trust: 20

    narrator_hint: "艾琳感激地接过护身符，眼中闪着泪光。她从包裹里取出一张泛黄的碎片递给你。"

  # ── Side Quest B: Mysterious Guest's Commission ───────────────────────────

  - id: guest_quest_start
    act: act1
    requires: []
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: relationship
          source: player
          target: mysterious_guest
          attribute: trust
          operator: ">="
          value: 5
        - type: location
          event_id: corridor

    fail_forward:
      after_turns: 10
      hint_event:
        description: "神秘旅客在走廊低语：'如果你愿意帮忙，我有个……请求。'"
        actor: mysterious_guest

    effects:
      quest_updates:
        guest_quest: { status: active }
      new_events:
        - id: guest_quest_accepted
          type: side_quest
          description: "神秘旅客请求你调查地下室的秘密"

    narrator_hint: "神秘旅客压低声音，语气紧迫而谨慎。他想知道酒保在地下室藏了什么。"

  - id: cellar_reported
    act: act1
    requires: [guest_quest_start]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: quest
          event_id: guest_quest
          check: active
        - type: event
          event_id: cellar_entered
          check: exists
        - type: location
          event_id: corridor

    effects:
      quest_updates:
        guest_quest: { status: reported }
      new_events:
        - id: cellar_info_shared
          type: side_quest
          description: "你把地下室的发现告诉了神秘旅客"

    narrator_hint: "你把地下室的发现告诉了神秘旅客，他听得很认真，不时微微点头。"

  - id: guest_quest_complete
    act: act1
    requires: [cellar_reported]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: event
          event_id: cellar_info_shared
          check: exists

    effects:
      quest_updates:
        guest_quest: { status: completed }
      new_events:
        - id: guest_quest_done
          type: side_quest
          description: "神秘旅客递给你一封密封的信件"
      add_items:
        - item_id: guest_letter
          to: inventory
      character_stat_deltas:
        mysterious_guest:
          trust: 15

    narrator_hint: "神秘旅客递给你一封密封的信件，眼中闪过复杂的神色。'这个……也许将来你会用到。'"

  # ── Side Quest C: Backyard Cart ───────────────────────────────────────────

  - id: cart_searched
    act: act1
    requires: []
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: location
          event_id: backyard
        - type: event
          event_id: searched_backyard
          check: exists

    fail_forward:
      after_turns: 5
      hint_event:
        description: "月光照在马车上，篷布下似乎有东西反光。"
        actor: player

    effects:
      quest_updates:
        backyard_search: { status: found_box }
      new_events:
        - id: cart_search_complete
          type: side_quest
          description: "在废弃马车下发现了一个生锈铁盒"
      add_items:
        - item_id: rusty_box
          to: backyard

    narrator_hint: "马车篷布下露出一个生锈的铁盒，看起来已经在这里很久了。"

  - id: box_opened_node
    act: act1
    requires: [cart_searched]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: event
          event_id: box_opened
          check: exists

    effects:
      quest_updates:
        backyard_search: { status: completed }
      new_events:
        - id: spare_key_obtained
          type: side_quest
          description: "从铁盒中获得了一把备用钥匙"

    narrator_hint: "铁盒里的备用钥匙，形状和地下室钥匙相似。也许能打开地下室的门。"

  # ── Multi-Ending: Decision Node ─────────────────────────────────────────

  - id: betray_guest
    act: act1
    requires: [guest_quest_complete]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: inventory
          event_id: guest_letter
        - type: location
          event_id: bar_area
        - type: event
          event_id: talked_to_bartender_about_letter
          check: exists

    effects:
      quest_updates:
        guest_betrayal: { status: completed }
      new_events:
        - id: guest_betrayed
          type: story
          description: "玩家将神秘旅客的信件交给了酒保"
      remove_items:
        - item_id: guest_letter
          from: inventory
      character_stat_deltas:
        bartender_grim:
          trust: 30
        mysterious_guest:
          trust: -50

    narrator_hint: "玩家做出了背叛的选择。酒保接过信件时眼中闪过贪婪的光芒。"

  # ── Multi-Ending: Good Ending ───────────────────────────────────────────

  - id: ending_good
    act: act1
    requires: [cellar_secret_revealed]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: event
          event_id: secret_learned
          check: exists
        - type: quest_count
          check: completed
          operator: ">="
          value: 2
        - type: relationship
          source: player
          target: traveler
          attribute: trust
          operator: ">="
          value: 20
        - type: event
          event_id: ending_bad_reached
          check: not_exists
        - type: event
          event_id: ending_neutral_reached
          check: not_exists

    effects:
      quest_updates:
        main_story: { status: good_ending }
      new_events:
        - id: ending_good_reached
          type: ending
          description: "玩家达成好结局「黎明之路」"
      trigger_ending: good_ending

    narrator_hint: "玩家赢得了酒馆众人的信任，揭开了密道的秘密。艾琳愿意与你同行，格里姆终于露出了难得的笑容。新的冒险在密道的尽头等待着你。用温暖、希望的笔触收束这段故事。"

  # ── Multi-Ending: Bad Ending ────────────────────────────────────────────

  - id: ending_bad
    act: act1
    requires: [betray_guest]
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: event
          event_id: guest_betrayed
          check: exists
        - type: event
          event_id: ending_good_reached
          check: not_exists
        - type: event
          event_id: ending_neutral_reached
          check: not_exists

    effects:
      quest_updates:
        main_story: { status: bad_ending }
      new_events:
        - id: ending_bad_reached
          type: ending
          description: "玩家达成坏结局「暗影独行」"
      trigger_ending: bad_ending

    narrator_hint: "你出卖了神秘旅客的信任。格里姆收下信件，脸上浮现出意味深长的笑容。走廊里传来沉重而急促的脚步声——神秘旅客已经消失在夜色中。你得到了酒保的信任，却失去了更重要的东西。用阴暗、孤独的笔触收束。"

  # ── Multi-Ending: Neutral Ending ────────────────────────────────────────

  - id: ending_neutral
    act: act1
    requires: []
    repeatable: false
    trigger:
      mode: passive
      conditions:
        - type: turn_count
          operator: ">="
          value: 40
        - type: event
          event_id: ending_good_reached
          check: not_exists
        - type: event
          event_id: ending_bad_reached
          check: not_exists

    effects:
      quest_updates:
        main_story: { status: neutral_ending }
      new_events:
        - id: ending_neutral_reached
          type: ending
          description: "玩家达成中结局「过客」"
      trigger_ending: neutral_ending

    narrator_hint: "夜深了，你终究只是酒馆里的一个过客。一些谜团仍未解开，一些故事仍在继续。你推开酒馆的门，走进晨雾弥漫的街道。身后传来隐约的笑声和杯盏碰撞声。用淡然、若有所思的笔触收束。"
