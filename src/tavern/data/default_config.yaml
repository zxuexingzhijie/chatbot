llm:
  intent:
    provider: openai
    model: gpt-4o-mini
    temperature: 0.1
    max_tokens: 200
  narrative:
    provider: openai
    model: gpt-4o
    temperature: 0.8
    max_tokens: 500

game:
  scenario: tavern
  auto_save_interval: 5
  undo_history_size: 50

debug:
  show_intent_json: false
  log_level: INFO
